  if (!d) return <span style={{width:size,height:size,display:'inline-block',flexShrink:0}}/>;
  return (
    <svg width={size} height={size} viewBox="0 0 24 24" fill="none"
      stroke={color} strokeWidth={sw} strokeLinecap="round" strokeLinejoin="round"
      style={{display:'block',flexShrink:0}}>
      {d.split('M').filter(Boolean).map((p,i)=><path key={i} d={'M'+p}/>)}
    </svg>
  );
};

// ── Base Components ───────────────────────────────────────────────
const MonoLabel = ({ children, style={} }) => (
  <span style={{ fontFamily:"'JetBrains Mono',monospace", fontSize:10, fontWeight:500, textTransform:'uppercase', letterSpacing:'0.9px', color:T.text3, ...style }}>{children}</span>
);

const Badge = ({ status }) => {
  const s = STATUS_MAP[status] || STATUS_MAP.pending;
  return (
    <span style={{ display:'inline-flex', alignItems:'center', gap:5, padding:'3px 8px', borderRadius:4, fontSize:11, fontWeight:600, color:s.color, background:s.bg, border:`1px solid ${s.dot}33`, letterSpacing:'0.02em', whiteSpace:'nowrap' }}>
      <span style={{ width:5, height:5, borderRadius:'50%', background:s.dot, display:'inline-block', flexShrink:0 }}/>
      {s.label}
    </span>
  );
};

const Card = ({ children, style={}, onClick }) => {
  const [hov, setHov] = React.useState(false);
  return (
    <div onClick={onClick} onMouseEnter={()=>onClick&&setHov(true)} onMouseLeave={()=>setHov(false)}
      style={{ background:T.surface, borderRadius:8, border:`1px solid ${hov?T.borderDark:T.border}`, transition:'border-color 0.15s', cursor:onClick?'pointer':'default', ...style }}>
      {children}
    </div>
  );
};

const Btn = ({ children, variant='primary', size='md', onClick, disabled, icon, style={} }) => {
  const [hov, setHov] = React.useState(false);
  const [act, setAct] = React.useState(false);
  const V = {
    primary:   { bg:T.text1,   color:'#fff',      hBg:'#2d2d2b', border:'none' },
    orange:    { bg:T.accent,  color:'#fff',       hBg:'#e64d00', border:'none' },
    secondary: { bg:T.bg,      color:T.text1,      hBg:T.surfaceWarm, border:`1px solid ${T.border}` },
    ghost:     { bg:'transparent', color:T.text2,  hBg:T.bg,     border:`1px solid ${T.border}` },
    danger:    { bg:T.danger,  color:'#fff',       hBg:'#991b1b', border:'none' },
    success:   { bg:T.success, color:'#fff',       hBg:'#166534', border:'none' },
    outline:   { bg:'transparent', color:T.text1,  hBg:T.bg,     border:`1px solid ${T.text1}` },
  };
  const S = { sm:{p:'4px 10px',fs:11}, md:{p:'7px 14px',fs:13}, lg:{p:'10px 20px',fs:14} };
  const v=V[variant]||V.primary; const s=S[size]||S.md;
  return (
    <button onClick={onClick} disabled={disabled}
      onMouseEnter={()=>!disabled&&setHov(true)} onMouseLeave={()=>{setHov(false);setAct(false);}}
      onMouseDown={()=>!disabled&&setAct(true)} onMouseUp={()=>setAct(false)}
      style={{
        background:hov?v.hBg:v.bg, color:v.color, border:v.border||'none',
        padding:s.p, fontSize:s.fs, borderRadius:4, fontWeight:600,
        cursor:disabled?'not-allowed':'pointer', opacity:disabled?0.45:1,
        transition:'background 0.1s, transform 0.1s',
        transform:act?'scale(0.95)':hov?'scale(1.04)':'scale(1)',
        display:'inline-flex', alignItems:'center', gap:6,
        fontFamily:'inherit', whiteSpace:'nowrap', letterSpacing:'0.01em', ...style,
      }}>
      {icon && <Ic n={icon} size={parseInt(s.fs)+1} color={v.color}/>}
      {children}
    </button>
  );
};

const FancyInput = ({ label, value, onChange, placeholder, type='text', required, disabled, hint, children }) => (
  <div style={{ display:'flex', flexDirection:'column', gap:4 }}>
    {label && <MonoLabel>{required&&<span style={{color:T.accent,marginRight:3}}>✱</span>}{label}</MonoLabel>}
    {children || (
      <input type={type} value={value} onChange={e=>onChange&&onChange(e.target.value)}
        placeholder={placeholder} disabled={disabled}
        style={{ border:`1px solid ${T.border}`, borderRadius:4, padding:'8px 10px', fontSize:13, color:T.text1, outline:'none', background:disabled?T.bg:T.surface, width:'100%', boxSizing:'border-box', transition:'border-color 0.15s', fontFamily:'inherit' }}
        onFocus={e=>e.target.style.borderColor=T.text1}
        onBlur={e=>e.target.style.borderColor=T.border}/>
    )}
    {hint && <span style={{ fontSize:11, color:T.text3 }}>{hint}</span>}
  </div>
);

const FancySelect = ({ label, value, onChange, options, required, disabled }) => (
  <div style={{ display:'flex', flexDirection:'column', gap:4 }}>
    {label && <MonoLabel>{required&&<span style={{color:T.accent,marginRight:3}}>✱</span>}{label}</MonoLabel>}
    <div style={{ position:'relative' }}>
      <select value={value} onChange={e=>onChange&&onChange(e.target.value)} disabled={disabled}
        style={{ border:`1px solid ${T.border}`, borderRadius:4, padding:'8px 10px', fontSize:13, color:T.text1, outline:'none', background:disabled?T.bg:T.surface, width:'100%', boxSizing:'border-box', cursor:'pointer', appearance:'none', fontFamily:'inherit' }}>
        {options.map(o=><option key={o.value||o} value={o.value||o}>{o.label||o}</option>)}
      </select>
      <span style={{ position:'absolute', right:8, top:'50%', transform:'translateY(-50%)', pointerEvents:'none', color:T.text3 }}><Ic n="chevronDown" size={13}/></span>
    </div>
  </div>
);

const Modal = ({ open, title, onClose, children, width=520 }) => {
  if (!open) return null;
  return (
    <div style={{ position:'fixed', inset:0, background:'rgba(17,17,17,0.55)', zIndex:1000, display:'flex', alignItems:'center', justifyContent:'center', padding:20, backdropFilter:'blur(3px)' }}
      onClick={e=>e.target===e.currentTarget&&onClose()}>
      <div style={{ background:T.surface, borderRadius:8, width:Math.min(width,'90vw'), maxHeight:'90vh', overflow:'auto', border:`1px solid ${T.border}`, boxShadow:'0 24px 60px rgba(17,17,17,0.22)' }}>
        <div style={{ padding:'16px 20px', borderBottom:`1px solid ${T.border}`, display:'flex', alignItems:'center', justifyContent:'space-between', position:'sticky', top:0, background:T.surface, zIndex:1 }}>
          <span style={{ fontSize:15, fontWeight:700, color:T.text1 }}>{title}</span>
          <button onClick={onClose} style={{ border:`1px solid ${T.border}`, background:T.bg, cursor:'pointer', borderRadius:4, padding:'4px 8px', display:'flex', color:T.text2, transition:'background 0.1s' }}
            onMouseEnter={e=>e.currentTarget.style.background=T.surfaceWarm}
            onMouseLeave={e=>e.currentTarget.style.background=T.bg}>
            <Ic n="x" size={14}/>
          </button>
        </div>
        <div style={{ padding:'20px' }}>{children}</div>
      </div>
    </div>
  );
};

const ApprovalTimeline = ({ nodes }) => {
  const ic = { approved:'checkCircle', rejected:'xCircle', pending:'clock', waiting:'clock' };
  const cc = { approved:T.success, rejected:T.danger, pending:'#f59e0b', waiting:T.border };
  return (
    <div style={{ display:'flex', flexDirection:'column' }}>
      {nodes.map((n,i)=>{
        const isLast=i===nodes.length-1;
        const c=cc[n.action]||T.border;
        return (
          <div key={i} style={{ display:'flex', gap:12 }}>
            <div style={{ display:'flex', flexDirection:'column', alignItems:'center' }}>
              <div style={{ width:28, height:28, borderRadius:'50%', background:n.action==='waiting'?T.bg:c+'18', border:`1.5px solid ${c}`, display:'flex', alignItems:'center', justifyContent:'center', flexShrink:0 }}>
                <Ic n={ic[n.action]||'clock'} size={13} color={n.action==='waiting'?T.text3:c}/>
              </div>
              {!isLast&&<div style={{ width:1, flex:1, background:T.border, margin:'3px 0', minHeight:18 }}/>}
            </div>
            <div style={{ paddingBottom:isLast?0:18, flex:1, paddingTop:3 }}>
              <div style={{ display:'flex', alignItems:'center', gap:8, flexWrap:'wrap' }}>
                <span style={{ fontSize:13, fontWeight:600, color:T.text1 }}>{n.role}</span>
                <span style={{ fontSize:12, color:T.text2 }}>{n.name}</span>
                {n.time&&<span style={{ fontSize:11, color:T.text3, marginLeft:'auto' }}>{n.time}</span>}
              </div>
              {n.comment&&<p style={{ margin:'4px 0 0', fontSize:12, color:T.text2, background:T.bg, padding:'5px 9px', borderRadius:4, border:`1px solid ${T.border}` }}>{n.comment}</p>}
              {n.action==='waiting'&&<p style={{ margin:'3px 0 0', fontSize:11, color:T.text3 }}>等待上一节点完成后触发</p>}
            </div>
          </div>
        );
      })}
    </div>
  );
};

const Toast = ({ msg, type='success', onClose }) => {
  if (!msg) return null;
  const cfg = { success:{ic:'checkCircle',c:T.success}, error:{ic:'alertTri',c:T.danger}, info:{ic:'info',c:'#1d4ed8'}, warning:{ic:'alertTri',c:T.warning} };
  const cf = cfg[type]||cfg.info;
  return (
    <div style={{ position:'fixed', top:20, right:20, zIndex:2000, background:T.surface, borderRadius:6, padding:'12px 16px', boxShadow:'0 8px 32px rgba(17,17,17,0.14)', display:'flex', alignItems:'center', gap:10, borderLeft:`3px solid ${cf.c}`, minWidth:240, maxWidth:360, border:`1px solid ${T.border}`, borderLeft:`3px solid ${cf.c}` }}>
      <Ic n={cf.ic} size={16} color={cf.c}/>
      <span style={{ fontSize:13, color:T.text1, flex:1 }}>{msg}</span>
      <button onClick={onClose} style={{ border:'none', background:'none', cursor:'pointer', color:T.text3, display:'flex' }}><Ic n="x" size={13}/></button>
    </div>
  );
};

// SVG Line Chart
const SVGLineChart = ({ data, h=160 }) => {
  const W=400; const PL=36; const PR=16; const PT=12; const PB=28;
  const cW=W-PL-PR; const cH=h-PT-PB;
  const allV=data.flatMap(d=>[d.v1,d.v2]).filter(v=>v>0);
  const maxV=Math.max(...allV,1);
  const px=i=>PL+(i/(data.length-1))*cW;
  const py=v=>PT+cH-(v/maxV)*cH;
  const path1=data.filter(d=>d.v1>0).map((d,_,a)=>{ const i=data.indexOf(d); return `${i===0?'M':'L'}${px(i).toFixed(1)},${py(d.v1).toFixed(1)}`; }).join(' ');
  const path2=data.filter(d=>d.v2>0).map((d,_,a)=>{ const i=data.indexOf(d); return `${i===0?'M':'L'}${px(i).toFixed(1)},${py(d.v2).toFixed(1)}`; }).join(' ');
  const area1=`${path1} L${px(data.filter(d=>d.v1>0).length-1).toFixed(1)},${(PT+cH).toFixed(1)} L${px(0).toFixed(1)},${(PT+cH).toFixed(1)} Z`;
  return (
    <svg viewBox={`0 0 ${W} ${h}`} style={{width:'100%',height:h}} preserveAspectRatio="xMidYMid meet">
      <defs>
        <linearGradient id="g1" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stopColor={T.accent} stopOpacity="0.15"/>
          <stop offset="100%" stopColor={T.accent} stopOpacity="0"/>
        </linearGradient>
      </defs>
      {[0,0.25,0.5,0.75,1].map((r,i)=>(
        <line key={i} x1={PL} y1={(PT+cH*(1-r)).toFixed(1)} x2={PL+cW} y2={(PT+cH*(1-r)).toFixed(1)} stroke={T.border} strokeWidth="0.8"/>
      ))}
      {data.map((d,i)=>(
        <line key={i} x1={px(i).toFixed(1)} y1={PT} x2={px(i).toFixed(1)} y2={PT+cH} stroke={T.border} strokeWidth="0.5" strokeDasharray="3,3"/>
      ))}
      {path1&&<path d={area1} fill="url(#g1)"/>}
      {path2&&<path d={path2} fill="none" stroke={T.border} strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round" strokeDasharray="4,3"/>}
      {path1&&<path d={path1} fill="none" stroke={T.accent} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"/>}
      {data.map((d,i)=>d.v1>0&&(
        <circle key={i} cx={px(i).toFixed(1)} cy={py(d.v1).toFixed(1)} r="3" fill={T.accent} stroke={T.surface} strokeWidth="1.5"/>
      ))}
      {data.map((d,i)=>(
        <text key={i} x={px(i).toFixed(1)} y={h-6} textAnchor="middle" fontSize="9" fill={T.text3} fontFamily="inherit">{d.label}</text>
      ))}
      {[Math.round(maxV*0.5),maxV].map((v,i)=>(
        <text key={i} x={PL-4} y={(py(v)+3).toFixed(1)} textAnchor="end" fontSize="9" fill={T.text3} fontFamily="inherit">{v}</text>
      ))}
    </svg>
  );
};

Object.assign(window, {
  T, STATUS_MAP, MOCK_APPLICATIONS, MOCK_CALENDAR,
  Ic, MonoLabel, Badge, Card, Btn, FancyInput, FancySelect, Modal,
  ApprovalTimeline, Toast, SVGLineChart,
});

</script>

          }

      </div>

// ── Application Detail (with Cancel / Reschedule) ─────────────────

const CalendarView = ({ notify }) => {

  const dates = getWeek(cur);
  const ds = d => d.toISOString().split('T')[0];
  const isToday = d => ds(d)==='2026-04-23';
  const hours = Array.from({length:11},(_,i)=>i+8);

  return (
    <div>

              <button key={ic} onClick={() => setCur(c=>{ const n=new Date(c); n.setDate(c.getDate()+d); return n; })}

              {dates[0].getMonth()+1}月 {dates[0].getDate()}日 — {dates[6].getDate()}日
            </div>
          </div>
        </div>
        <div style={{ display:'flex', gap:12, alignItems:'center' }}>
          {[['已批准',T.success],['审批中',T.warning]].map(([l,c]) => (
            <span key={l} style={{ display:'inline-flex', alignItems:'center', gap:5, fontSize:12, color:T.text2 }}>
              <span style={{ width:8, height:8, borderRadius:2, background:c }}/>{l}
            </span>
          ))}
          <Btn variant="outline" size="sm" icon="download" onClick={() => notify('正在生成导出文件…','info')}>导出</Btn>
        </div>
      </div>

      <Card style={{ overflow:'hidden' }}>
        <div style={{ display:'grid', gridTemplateColumns:'50px repeat(7,1fr)', background:T.bg, borderBottom:`2px solid ${T.border}` }}>
          <div style={{ borderRight:`1px solid ${T.border}` }}/>
          {dates.map((d,i) => (
            <div key={i} style={{ padding:'10px 6px', textAlign:'center', borderLeft:`1px solid ${T.border}`, background:isToday(d)?T.accentLight:'transparent' }}>
              <MonoLabel style={{ display:'block', marginBottom:3, color:isToday(d)?T.accent:T.text3 }}>{WD[i]}</MonoLabel>
              <div style={{ width:30, height:30, borderRadius:'50%', margin:'0 auto', background:isToday(d)?T.text1:'transparent', display:'flex', alignItems:'center', justifyContent:'center', fontSize:14, fontWeight:700, color:isToday(d)?'#fff':T.text1 }}>{d.getDate()}</div>
            </div>
          ))}
        </div>
        <div style={{ maxHeight:460, overflow:'auto' }}>
          {hours.map(h => (
            <div key={h} style={{ display:'grid', gridTemplateColumns:'50px repeat(7,1fr)', minHeight:52, borderBottom:`1px solid #f5f4f0` }}>
              <div style={{ padding:'6px 8px', fontSize:10, color:T.text3, textAlign:'right', background:T.bg, borderRight:`1px solid ${T.border}`, paddingTop:9, fontFamily:'monospace' }}>{h}:00</div>
              {dates.map((d,i) => {
                const evs = MOCK_CALENDAR.filter(e => e.start===ds(d) && parseInt(e.startTime.split(':')[0])===h);
                return (
                  <div key={i} style={{ borderLeft:`1px solid #f0ede8`, padding:'3px', background:isToday(d)?'#fffef9':'' }}>
                    {evs.map(ev => (
                      <div key={ev.id} onClick={() => notify(`${ev.title}：${ev.startTime} — ${ev.end}`,'info')}

                      </div>
                    ))}
                  </div>

            </div>
          ))}
        </div>
      </Card>

            <Ic n={k==='excel'?'table':'fileText'} size={13} color={tab===k?'#fff':T.text2}/>{l}

      {tab === 'excel' && (
        <div>
          <div style={{ display:'flex', alignItems:'center', gap:8, marginBottom:12 }}>
            <div style={{ fontSize:13, color:T.text2 }}>列结构与原始 <code style={{ background:T.bg, padding:'1px 5px', borderRadius:3, fontSize:11 }}>展厅参观数据表.xlsx Sheet2</code> 完全对齐</div>
            <Btn variant="outline" size="sm" icon="download" onClick={() => { onClose(); }}>下载 Excel</Btn>
          </div>
          <div style={{ overflow:'auto', border:`1px solid ${T.border}`, borderRadius:6 }}>
            <table style={{ width:'100%', borderCollapse:'collapse', fontSize:11, minWidth:900 }}>
              <thead>
                <tr style={{ background:T.text1 }}>
                  {EXCEL_COLS.map(c => (
                    <th key={c} style={{ padding:'7px 10px', color:'#fff', fontWeight:600, whiteSpace:'nowrap', textAlign:'left', borderRight:`1px solid rgba(255,255,255,0.1)`, fontFamily:'monospace', letterSpacing:'0.03em' }}>{c}</th>
                  ))}
                </tr>
              </thead>
              <tbody>
                {EXCEL_ROWS.map((row, i) => (
                  <tr key={i} style={{ background:i%2===0?T.bg:T.surface }}
                    onMouseEnter={e=>e.currentTarget.style.background=T.accentLight}
                    onMouseLeave={e=>e.currentTarget.style.background=i%2===0?T.bg:T.surface}>
                    {row.map((cell, j) => (
                      <td key={j} style={{ padding:'6px 10px', borderRight:`1px solid ${T.border}`, borderBottom:`1px solid ${T.border}`, color:cell==='待录入'?T.text3:T.text1, whiteSpace:'nowrap' }}>{cell}</td>
                    ))}

          </div>
          <div style={{ marginTop:10, fontSize:11, color:T.text3 }}>显示 {EXCEL_ROWS.length} 条 / 共 18 条记录（演示数据）</div>

      {tab === 'docx' && (
        <div>
          <div style={{ display:'flex', alignItems:'center', gap:8, marginBottom:12 }}>
            <div style={{ fontSize:13, color:T.text2 }}>通过 poi-tl 按原模板回填生成存档版申请单</div>
            <Btn variant="outline" size="sm" icon="download" onClick={() => { onClose(); }}>下载 Word</Btn>

            <DocxPreview/>
          </div>

  );
};

Object.assign(window, { NotificationCenter, ExportPreviewModal, MOCK_NOTIFS });

</script>

<script type="text/babel">
const { useState, useEffect, useCallback, useRef } = React;

const ROLES = [
  { id:'applicant', label:'申请人',     sub:'区县 / 部门同事',    icon:'filePlus',   desc:'提交参观申请、查看审批进度、补录参观结果', accent:'#ff5600',

  { id:'approver',  label:'审批人',     sub:'部门领导 / 展厅主管', icon:'checkCircle', desc:'审批参观申请、处理流转节点、查看排期', accent:'#2c6415',
    nav:[{ id:'approval', label:'待我审批', icon:'clock', badge:2 },{ id:'calendar', label:'排期日历', icon:'calendar' }] },
  { id:'admin',     label:'展厅管理员', sub:'全局管理 / 数据报送', icon:'settings',    desc:'排期总览、参观留存录入、统计看板与省公司报送', accent:'#1d4ed8',
    nav:[{ id:'calendar', label:'排期日历', icon:'calendar' },{ id:'visit', label:'参观留存', icon:'camera' },{ id:'dashboard', label:'统计看板', icon:'barChart' },{ id:'approval', label:'全部申请', icon:'clipboard' }] },
  { id:'viewer',    label:'省公司查看员',sub:'只读统计',           icon:'eye',         desc:'查看统计看板、战客覆盖率及各维度指标', accent:'#92400e',
    nav:[{ id:'dashboard', label:'统计看板', icon:'barChart' }] },
];

const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "accentColor": "#ff5600",
  "sidebarColor": "#111111"
}/*EDITMODE-END*/;

// ── Role Selector ─────────────────────────────────────────────────
const RoleSelector = ({ onSelect }) => {
  const [hov, setHov] = useState(null);
  return (
    <div style={{ minHeight:'100vh', background:T.text1, display:'flex', flexDirection:'column', alignItems:'center', justifyContent:'center', padding:40 }}>
      {/* Subtle grid texture */}
      <div style={{ position:'absolute', inset:0, backgroundImage:'radial-gradient(circle, #ffffff08 1px, transparent 1px)', backgroundSize:'28px 28px', pointerEvents:'none' }}/>

      {/* Header */}
      <div style={{ textAlign:'center', marginBottom:48, animation:'fadeUp 0.5s ease', position:'relative' }}>
        <div style={{ width:52, height:52, borderRadius:10, border:'1px solid rgba(255,255,255,0.15)', display:'flex', alignItems:'center', justifyContent:'center', margin:'0 auto 18px', background:'rgba(255,255,255,0.06)' }}>
          <Ic n="building" size={26} color="rgba(255,255,255,0.85)"/>
        </div>
        <h1 style={{ color:'#fff', fontSize:24, fontWeight:700, margin:0, letterSpacing:'-0.4px' }}>展厅访问申请与留存系统</h1>
        <p style={{ color:'rgba(255,255,255,0.4)', marginTop:8, fontSize:13 }}>选择角色进入系统</p>
      </div>

      {/* Role cards */}
      <div style={{ display:'grid', gridTemplateColumns:'repeat(2,1fr)', gap:12, width:'100%', maxWidth:580, position:'relative' }}>
        {ROLES.map((r,i) => {
          const isHov = hov===r.id;
          return (
            <div key={r.id} onClick={() => onSelect(r)} onMouseEnter={() => setHov(r.id)} onMouseLeave={() => setHov(null)}
              style={{ border:`1px solid ${isHov?'rgba(255,255,255,0.25)':'rgba(255,255,255,0.08)'}`, borderRadius:8, padding:'20px', cursor:'pointer', transition:'all 0.18s', background:isHov?'rgba(255,255,255,0.08)':'rgba(255,255,255,0.04)', transform:isHov?'translateY(-2px)':'none', animation:`fadeUp 0.4s ease ${i*0.06}s both` }}>
              <div style={{ display:'flex', alignItems:'center', gap:10, marginBottom:10 }}>
                <div style={{ width:34, height:34, borderRadius:6, background:`${r.accent}22`, border:`1px solid ${r.accent}44`, display:'flex', alignItems:'center', justifyContent:'center', flexShrink:0 }}>
                  <Ic n={r.icon} size={16} color={r.accent}/>
                </div>
                <div>
                  <div style={{ color:'#fff', fontSize:14, fontWeight:700 }}>{r.label}</div>
                  <MonoLabel style={{ color:'rgba(255,255,255,0.35)', fontSize:9 }}>{r.sub}</MonoLabel>
                </div>
              </div>
              <p style={{ color:'rgba(255,255,255,0.55)', fontSize:12, lineHeight:1.6, margin:'0 0 12px' }}>{r.desc}</p>
              <div style={{ display:'flex', alignItems:'center', gap:4, fontSize:11, color:isHov?r.accent:'rgba(255,255,255,0.25)', fontWeight:600, transition:'color 0.15s' }}>
                <span>进入系统</span><Ic n="chevronRight" size={11} color="inherit"/>
              </div>
            </div>
          );
        })}
      </div>

      <p style={{ color:'rgba(255,255,255,0.15)', marginTop:36, fontSize:11 }}>展厅访问管理平台 · 演示原型</p>
    </div>
  );
};

// ── Sidebar ───────────────────────────────────────────────────────
const Sidebar = ({ role, page, onNav, onRoleChange }) => (
  <div style={{ width:212, background:T.sidebar, display:'flex', flexDirection:'column', height:'100vh', position:'fixed', left:0, top:0, zIndex:100, borderRight:'1px solid rgba(255,255,255,0.05)' }}>
    {/* Logo */}
    <div style={{ padding:'16px 16px 14px', borderBottom:'1px solid rgba(255,255,255,0.07)', display:'flex', alignItems:'center', gap:9 }}>
      <div style={{ width:30, height:30, background:'rgba(255,255,255,0.08)', borderRadius:7, display:'flex', alignItems:'center', justifyContent:'center', flexShrink:0 }}>
        <Ic n="building" size={15} color="rgba(255,255,255,0.75)"/>
      </div>
      <div>
        <div style={{ color:'#fff', fontSize:12, fontWeight:700, lineHeight:1.3 }}>展厅申请系统</div>
        <div style={{ color:'rgba(255,255,255,0.3)', fontSize:10, marginTop:1 }}>访问申请与留存</div>
      </div>
    </div>

    {/* Role pill */}
    <div style={{ margin:'10px 10px 4px', padding:'9px 11px', background:'rgba(255,255,255,0.05)', borderRadius:6, cursor:'pointer', border:'1px solid rgba(255,255,255,0.06)', transition:'background 0.12s' }}
      onClick={onRoleChange} onMouseEnter={e=>e.currentTarget.style.background='rgba(255,255,255,0.09)'} onMouseLeave={e=>e.currentTarget.style.background='rgba(255,255,255,0.05)'}>
      <MonoLabel style={{ color:'rgba(255,255,255,0.3)', display:'block', marginBottom:6 }}>当前角色</MonoLabel>
      <div style={{ display:'flex', alignItems:'center', gap:8 }}>
        <div style={{ width:24, height:24, borderRadius:5, background:`${role.accent}33`, display:'flex', alignItems:'center', justifyContent:'center', flexShrink:0 }}>
          <Ic n={role.icon} size={12} color={role.accent}/>
        </div>
        <div style={{ flex:1 }}>
          <div style={{ color:'#fff', fontSize:11, fontWeight:700 }}>{role.label}</div>
          <div style={{ color:'rgba(255,255,255,0.3)', fontSize:10 }}>{role.sub}</div>
        </div>
        <Ic n="rotate" size={11} color="rgba(255,255,255,0.25)"/>
      </div>
    </div>

    {/* Nav */}
    <nav style={{ flex:1, padding:'8px 8px', display:'flex', flexDirection:'column', gap:1 }}>
      <MonoLabel style={{ color:'rgba(255,255,255,0.2)', display:'block', padding:'6px 8px 4px' }}>导航</MonoLabel>
      {role.nav.map(item => {
        const act = page===item.id;
        return (
          <button key={item.id} onClick={() => onNav(item.id)}
            style={{ display:'flex', alignItems:'center', gap:8, padding:'8px 10px', borderRadius:5, border:'none', cursor:'pointer', width:'100%', textAlign:'left', background:act?`${role.accent}18`:'transparent', color:act?'#fff':'rgba(255,255,255,0.45)', transition:'all 0.1s', fontFamily:'inherit', position:'relative' }}
            onMouseEnter={e=>!act&&(e.currentTarget.style.background='rgba(255,255,255,0.06)',e.currentTarget.style.color='rgba(255,255,255,0.75)')}
            onMouseLeave={e=>!act&&(e.currentTarget.style.background='transparent',e.currentTarget.style.color='rgba(255,255,255,0.45)')}>
            {act && <div style={{ position:'absolute', left:0, top:'50%', transform:'translateY(-50%)', width:3, height:16, borderRadius:'0 2px 2px 0', background:role.accent }}/>}
            <Ic n={item.icon} size={14} color={act?role.accent:'currentColor'}/>
            <span style={{ fontSize:12, fontWeight:act?700:400, flex:1 }}>{item.label}</span>
            {item.badge && <span style={{ background:T.danger, color:'#fff', fontSize:9, fontWeight:700, padding:'1px 5px', borderRadius:3 }}>{item.badge}</span>}
          </button>
        );
      })}
    </nav>

    {/* User */}
    <div style={{ padding:'10px 12px', borderTop:'1px solid rgba(255,255,255,0.06)', display:'flex', alignItems:'center', gap:8 }}>
      <div style={{ width:28, height:28, borderRadius:'50%', background:'rgba(255,255,255,0.1)', display:'flex', alignItems:'center', justifyContent:'center', fontSize:11, color:'#fff', fontWeight:700, flexShrink:0 }}>李</div>
      <div style={{ flex:1 }}>
        <div style={{ color:'rgba(255,255,255,0.8)', fontSize:11, fontWeight:600 }}>李建国</div>
        <div style={{ color:'rgba(255,255,255,0.3)', fontSize:10 }}>天河区</div>
      </div>
    </div>
  </div>
);

// ── Top Bar ───────────────────────────────────────────────────────
const TopBar = ({ page, role, onNotif, unread }) => {
  const TITLES = { 'my-apps':'我的申请','new-app':'新建申请','h5-view':'H5 移动端预览','approval':'待我审批','calendar':'排期日历','visit':'参观留存','dashboard':'统计看板' };
  const BREAD  = { 'my-apps':['申请管理','我的申请'],'new-app':['申请管理','新建申请'],'h5-view':['移动端','H5 预览'],'approval':['审批管理','待我审批'],'calendar':['排期管理','排期日历'],'visit':['参观管理','参观留存'],'dashboard':['统计报表','统计看板'] };
  const crumbs = BREAD[page] || [TITLES[page]||page];
  return (
    <div style={{ position:'fixed', top:0, left:212, right:0, height:50, background:'rgba(250,249,246,0.95)', backdropFilter:'blur(8px)', borderBottom:`1px solid ${T.border}`, zIndex:99, display:'flex', alignItems:'center', padding:'0 20px', gap:10 }}>
      <div style={{ display:'flex', alignItems:'center', gap:5 }}>
        {crumbs.map((c,i) => (
          <React.Fragment key={i}>
            {i>0&&<Ic n="chevronRight" size={11} color={T.text3}/>}
            <span style={{ fontSize:12, color:i===crumbs.length-1?T.text1:T.text3, fontWeight:i===crumbs.length-1?700:400 }}>{c}</span>
          </React.Fragment>
        ))}
      </div>
      <div style={{ flex:1 }}/>
      <span style={{ fontSize:11, color:T.text3, fontFamily:'monospace' }}>2026-04-23 Thu</span>
      <div style={{ width:1, height:14, background:T.border }}/>
      <div style={{ display:'flex', alignItems:'center', gap:4 }}>
        <span style={{ width:7, height:7, borderRadius:'50%', background:role.accent, display:'inline-block' }}/>
        <span style={{ fontSize:11, color:T.text2, fontWeight:600 }}>{role.label}</span>
      </div>
      <button onClick={onNotif} style={{ position:'relative', border:`1px solid ${T.border}`, background:T.surface, cursor:'pointer', borderRadius:5, padding:'5px 8px', display:'flex', alignItems:'center', transition:'background 0.1s' }}
        onMouseEnter={e=>e.currentTarget.style.background=T.bg} onMouseLeave={e=>e.currentTarget.style.background=T.surface}>
        <Ic n="bell" size={14} color={T.text2}/>
        {unread>0&&<span style={{ position:'absolute', top:2, right:2, width:8, height:8, background:T.accent, borderRadius:'50%', border:`2px solid ${T.surface}` }}/>}
      </button>
    </div>
  );
};

// ── Tweaks Panel ──────────────────────────────────────────────────
const TweaksPanel = ({ visible }) => {
  if(!visible) return null;
  return (
    <div style={{ position:'fixed', bottom:20, right:20, width:240, background:T.surface, borderRadius:8, boxShadow:'0 8px 32px rgba(17,17,17,0.14)', border:`1px solid ${T.border}`, zIndex:500, overflow:'hidden' }}>
      <div style={{ background:T.text1, padding:'10px 14px', display:'flex', alignItems:'center', gap:7 }}>
        <Ic n="settings" size={13} color="rgba(255,255,255,0.6)"/>
        <span style={{ color:'#fff', fontWeight:700, fontSize:12 }}>Tweaks</span>
      </div>
      <div style={{ padding:14 }}>
        <MonoLabel style={{ display:'block', marginBottom:8 }}>主题色</MonoLabel>
        <div style={{ display:'flex', gap:7, marginBottom:14 }}>
          {['#ff5600','#2c6415','#1d4ed8','#92400e','#6b21a8'].map(c=>(
            <div key={c} onClick={()=>window.parent.postMessage({type:'__edit_mode_set_keys',edits:{accentColor:c}},'*')}
              style={{ width:24, height:24, borderRadius:'50%', background:c, cursor:'pointer', border:`2px solid ${c===TWEAK_DEFAULTS.accentColor?T.text1:'transparent'}`, transition:'transform 0.1s' }}
              onMouseEnter={e=>e.currentTarget.style.transform='scale(1.2)'} onMouseLeave={e=>e.currentTarget.style.transform='scale(1)'}/>
          ))}
        </div>
        <div style={{ paddingTop:10, borderTop:`1px solid ${T.border}`, fontSize:11, color:T.text3 }}>展厅访问申请与留存系统</div>
      </div>
    </div>
  );
};

// ── Main App ──────────────────────────────────────────────────────
const App = () => {
  const [role, setRole] = useState(null);
  const [page, setPage] = useState(null);
  const [toast, setToast] = useState(null);
  const [tweaks, setTweaks] = useState(false);
  const [showNotif, setShowNotif] = useState(false);
  const [showExport, setShowExport] = useState(false);

  const notify = useCallback((msg, type='success') => {
    setToast({ msg, type });
    setTimeout(() => setToast(null), 3500);
  }, []);

  const handleRoleSelect = r => {
    setRole(r); setPage(r.nav[0].id);
    try { localStorage.setItem('eh_role2',r.id); localStorage.setItem('eh_page2',r.nav[0].id); } catch(e){}
  };

  useEffect(() => {
    try {
      const rid = localStorage.getItem('eh_role2');
      const pg  = localStorage.getItem('eh_page2');
      if(rid) { const r=ROLES.find(x=>x.id===rid); if(r){setRole(r);setPage(pg||r.nav[0].id);} }
    } catch(e){}
    const handler = e => {
      if(e.data?.type==='__activate_edit_mode')  setTweaks(true);
      if(e.data?.type==='__deactivate_edit_mode') setTweaks(false);
    };
    window.addEventListener('message', handler);
    window.parent.postMessage({ type:'__edit_mode_available' },'*');
    return () => window.removeEventListener('message', handler);
  }, []);

  const handleNav = id => {
    setPage(id); setShowNotif(false);
    try { localStorage.setItem('eh_page2',id); } catch(e){}
  };

  const unread = typeof MOCK_NOTIFS !== 'undefined' ? MOCK_NOTIFS.filter(n=>!n.read).length : 2;

  const renderPage = () => {
    switch(page) {
      case 'my-apps':   return <ApplyView notify={notify}/>;
      case 'new-app':   return <ApplyView notify={notify} startOnNew/>;
      case 'h5-view':   return <ApplyView notify={notify} showMobile/>;
      case 'approval':  return <ApprovalView notify={notify}/>;
      case 'calendar':  return <CalendarView notify={notify}/>;
      case 'visit':     return <VisitRecordView notify={notify}/>;
      case 'dashboard': return <DashboardView notify={notify} onExport={()=>setShowExport(true)}/>;
      default:          return <ApplyView notify={notify}/>;
    }
  };

  if(!role) return <RoleSelector onSelect={handleRoleSelect}/>;

  return (
    <div style={{ display:'flex', minHeight:'100vh', background:T.bg }}>
      <Sidebar role={role} page={page} onNav={handleNav} onRoleChange={()=>{ setRole(null); setPage(null); try{localStorage.removeItem('eh_role2');}catch(e){} }}/>
      <div style={{ marginLeft:212, flex:1 }}>
        <TopBar page={page} role={role} onNotif={() => setShowNotif(v=>!v)} unread={unread}/>
        <main key={page} style={{ marginTop:50, padding:'24px', minHeight:'calc(100vh - 50px)', animation:'fadeUp 0.25s ease' }}>
          {renderPage()}
        </main>
      </div>

      {/* Notification center */}
      {showNotif && <NotificationCenter onClose={() => setShowNotif(false)}/>}
      {showNotif && <div style={{ position:'fixed', inset:0, zIndex:799 }} onClick={() => setShowNotif(false)}/>}

      {/* Export preview */}
      <ExportPreviewModal open={showExport} onClose={() => setShowExport(false)}/>

      <Toast msg={toast?.msg} type={toast?.type} onClose={() => setToast(null)}/>
      <TweaksPanel visible={tweaks}/>
    </div>
  );
};

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
